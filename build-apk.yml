name: Build FlickX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: npm install

      - name: Inicializar Capacitor
        run: |
          npx cap init FlickX com.flickx.app --web-dir www || true

      - name: Agregar plataforma Android
        run: |
          npx cap add android

      - name: Sincronizar archivos web
        run: |
          npx cap sync android

      - name: Configurar permisos AndroidManifest
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n</manifest>|' android/app/src/main/AndroidManifest.xml
          sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|g' android/app/src/main/AndroidManifest.xml || true
          # Enable cleartext in application tag if not already set
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|g' android/app/src/main/AndroidManifest.xml || true

      - name: Hacer ejecutable el gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk FlickX.apk

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: FlickX-APK
          path: FlickX.apk
          retention-days: 30

      - name: Mostrar info del APK
        run: |
          echo "✅ APK compilado exitosamente"
          ls -lh FlickX.apk
          echo "Descarga el APK desde la pestaña 'Actions' > este workflow > Artifacts"
